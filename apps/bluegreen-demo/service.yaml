apiVersion: v1
kind: Service
metadata:
  name: bluegreen-demo-active
  namespace: default
spec:
  selector:
    app: bluegreen-demo
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: bluegreen-demo-preview
  namespace: default
spec:
  selector:
    app: bluegreen-demo
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
