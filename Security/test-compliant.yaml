apiVersion: v1
kind: Pod
metadata:
  name: test-compliant
  namespace: default
spec:
  containers:
    - name: test
      image: nginx:1.21
      securityContext:
        privileged: false
      resources:
        limits:
          cpu: "200m"
          memory: "256Mi"
        requests:
          cpu: "100m"
          memory: "128Mi"
